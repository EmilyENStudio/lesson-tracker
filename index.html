<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="format-detection" content="telephone=no">
  <title>Emily's English Studio</title>
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #764ba2;
      --secondary: #F5A623;
      --secondary-light: #FFB84D;
      --bg: #F7F8FA;
      --card-bg: #FFFFFF;
      --text-dark: #1a1a2e;
      --text-medium: #4a4a6a;
      --text-light: #999999;
      --border: #E8E8E8;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.15), 0 2px 8px rgba(0, 0, 0, 0.1);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
    }

    /* Loading State */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-light);
      font-size: 14px;
    }

    /* ========== Login Page - Copilot Style ========== */
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Gradient Background */
    .login-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f5f0ff 0%, #fce4f0 35%, #e8e0f0 65%, #f0e6ff 100%);
      z-index: -2;
    }

    /* Blur Orbs */
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
    }

    .login-orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.7);
      top: -100px;
      left: -100px;
      animation: float1 20s ease-in-out infinite;
    }

    .login-orb-2 {
      width: 250px;
      height: 250px;
      background: rgba(240, 200, 230, 0.5);
      bottom: -80px;
      right: -80px;
      animation: float2 25s ease-in-out infinite;
    }

    .login-orb-3 {
      width: 200px;
      height: 200px;
      background: rgba(200, 180, 240, 0.4);
      top: 50%;
      right: -100px;
      animation: float3 22s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(50px, 30px); }
      66% { transform: translate(-30px, 50px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-40px, -30px); }
      66% { transform: translate(30px, -50px); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-50px, 40px); }
    }

    /* Login Card */
    .login-card {
      width: min(360px, 90vw);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px rgba(180, 160, 200, 0.15), 0 2px 8px rgba(180, 160, 200, 0.1);
      padding: 32px;
      text-align: center;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      margin-bottom: 24px;
    }

    .login-logo .icon {
      font-size: 32px;
      margin-bottom: 8px;
      display: block;
    }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.5px;
    }

    /* Bilingual Quotes */
    .quotes-section {
      margin: 16px 0;
      padding: 16px 0;
      position: relative;
    }

    .quotes-section::before,
    .quotes-section::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.3), transparent);
    }

    .quotes-section::before {
      top: 0;
    }

    .quotes-section::after {
      bottom: 0;
    }

    .quote-chinese {
      font-family: 'Songti SC', 'STSong', 'SimSun', serif;
      font-size: 16px;
      color: var(--text-dark);
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .quote-chinese-author {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .quote-english {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-medium);
      line-height: 1.6;
      white-space: pre-line;
    }

    .quote-english-author {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
      font-style: normal;
    }

    /* Login Form */
    .login-form {
      margin-top: 24px;
    }

    .login-input {
      width: 100%;
      height: 44px;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      color: var(--text-dark);
      background: white;
      transition: all 0.3s ease;
      outline: none;
      text-align: center;
    }

    .login-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .login-input::placeholder {
      color: var(--text-light);
    }

    .login-btn {
      width: 100%;
      margin-top: 16px;
      height: 44px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .login-btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-error {
      color: #FF4D4F;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
      animation: fadeIn 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Login Footer */
    .login-footer {
      margin-top: 32px;
      text-align: center;
      color: rgba(120, 100, 140, 0.6);
      font-size: 12px;
    }

    /* ========== Student Detail Page ========== */
    .detail-page {
      display: none;
    }

    .detail-page.active {
      display: block;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 16px 32px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 8px;
      opacity: 0.9;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .logout-btn:hover {
      opacity: 1;
    }

    .student-info h1 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .student-info .label {
      font-size: 13px;
      opacity: 0.85;
      font-weight: 400;
    }

    .last-updated {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .progress-ring-container {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.2);
      stroke-width: 6;
    }

    .progress-ring-fill {
      fill: none;
      stroke: white;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 201;
      stroke-dashoffset: 201;
      transition: stroke-dashoffset 1.2s ease-out;
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .progress-text .number {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    .progress-text .unit {
      font-size: 10px;
      opacity: 0.8;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      background: var(--card-bg);
      margin: -16px 16px 20px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 10;
      overflow: hidden;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 16px 8px;
      position: relative;
    }

    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: var(--border);
    }

    .stat-item .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.2;
    }

    .stat-item:nth-child(2) .stat-number {
      color: var(--secondary);
    }

    .stat-item:nth-child(3) .stat-number {
      color: #52C41A;
    }

    .stat-item .stat-label {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* Records Section */
    .records-section {
      padding: 0 16px 100px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 16px;
      padding-left: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
      border-radius: 2px;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 8px;
      bottom: 40px;
      width: 2px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 50%, var(--border) 100%);
      border-radius: 1px;
    }

    .record-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.5s ease forwards;
    }

    .record-card:nth-child(1) { animation-delay: 0.1s; }
    .record-card:nth-child(2) { animation-delay: 0.2s; }
    .record-card:nth-child(3) { animation-delay: 0.3s; }
    .record-card:nth-child(4) { animation-delay: 0.4s; }
    .record-card:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .record-card:hover {
      box-shadow: var(--shadow-hover);
    }

    .record-header {
      padding: 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .record-date {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .record-date .date {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .record-date .time {
      font-size: 12px;
      color: var(--text-light);
    }

    .lesson-badge {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .record-content {
      padding: 0 16px 16px;
      display: block;
    }

    .record-content.collapsed {
      display: none;
    }

    .course-info {
      background: linear-gradient(135deg, #F0F7FF 0%, #E8F4FD 100%);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .course-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--primary-dark);
      margin-bottom: 4px;
    }

    .lesson-title {
      font-size: 13px;
      color: var(--text-medium);
    }

    .knowledge-section, .homework-section {
      margin-bottom: 12px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .section-header .icon {
      font-size: 16px;
    }

    .knowledge-section .section-header {
      color: var(--primary);
    }

    .homework-section .section-header {
      color: var(--secondary);
    }

    .knowledge-list, .homework-list {
      padding-left: 22px;
    }

    .knowledge-list li, .homework-list li {
      font-size: 13px;
      color: var(--text-medium);
      margin-bottom: 6px;
      line-height: 1.5;
      position: relative;
    }

    .knowledge-list li::marker {
      color: var(--primary);
    }

    .homework-list li::marker {
      color: var(--secondary);
    }

    /* Timeline Dot */
    .timeline-dot {
      position: absolute;
      left: -24px;
      top: 24px;
      width: 16px;
      height: 16px;
      background: var(--card-bg);
      border: 3px solid var(--primary);
      border-radius: 50%;
      z-index: 2;
    }

    .timeline-dot::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      z-index: 100;
    }

    .footer-brand {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .footer-tagline {
      font-size: 11px;
      color: var(--text-light);
    }

    /* Expand/Collapse Indicator */
    .expand-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      color: var(--text-light);
      font-size: 12px;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .expand-indicator:hover {
      color: var(--primary);
    }

    .expand-indicator .arrow {
      transition: transform 0.3s;
    }

    .expand-indicator.expanded .arrow {
      transform: rotate(180deg);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 360px) {
      .header {
        padding: 16px 16px 28px;
      }

      .login-card {
        padding: 24px 20px;
      }

      .login-logo .icon {
        font-size: 28px;
      }

      .login-logo h1 {
        font-size: 18px;
      }

      .student-info h1 {
        font-size: 22px;
      }

      .progress-ring-container {
        width: 70px;
        height: 70px;
      }

      .stat-item .stat-number {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Loading State -->
    <div class="loading-container" id="loadingContainer">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>

    <!-- Login Page -->
    <div id="loginPage" class="login-page" style="display: none;">
      <!-- Gradient Background -->
      <div class="login-bg"></div>
      
      <!-- Blur Orbs -->
      <div class="login-orb login-orb-1"></div>
      <div class="login-orb login-orb-2"></div>
      <div class="login-orb login-orb-3"></div>
      
      <div class="login-card">
        <div class="login-logo">
          <span class="icon">📚</span>
          <h1>Emily's English Studio</h1>
        </div>
        
        <!-- Bilingual Quotes -->
        <div class="quotes-section">
          <p class="quote-chinese">亲其师，信其道。</p>
          <p class="quote-chinese-author">——《礼记·学记》</p>
          <p class="quote-english">The mind is not a vessel to be filled,
but a fire to be kindled.</p>
          <p class="quote-english-author">— Plutarch</p>
        </div>
        
        <form class="login-form" id="loginForm">
          <input 
            type="text" 
            class="login-input" 
            id="nameInput" 
            placeholder="请输入学员姓名"
            autocomplete="off"
          >
          <button type="submit" class="login-btn">查看消课记录</button>
          <div class="login-error" id="loginError"></div>
        </form>
      </div>
      
      <div class="login-footer">
        绍兴城南 · RAZ & Power Up
      </div>
    </div>

    <!-- Detail Page (Student Records) -->
    <div id="detailPage" class="detail-page">
      <header class="header">
        <div class="header-top">
          <div>
            <button class="logout-btn" id="logoutBtn">
              <span>←</span>
              <span>退出登录</span>
            </button>
            <div class="student-info">
              <div class="label">学员课时记录</div>
              <h1 id="studentName">加载中...</h1>
              <div class="last-updated" id="lastUpdated"></div>
            </div>
          </div>
          <div class="progress-ring-container">
            <svg class="progress-ring" width="80" height="80" viewBox="0 0 80 80">
              <circle class="progress-ring-bg" cx="40" cy="40" r="32"/>
              <circle class="progress-ring-fill" id="progressRing" cx="40" cy="40" r="32"/>
            </svg>
            <div class="progress-text">
              <div class="number" id="remainingHours">--</div>
              <div class="unit">剩余</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-number" id="totalHours">--</div>
          <div class="stat-label">总课时</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="usedHours">--</div>
          <div class="stat-label">已消课</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="remainHours">--</div>
          <div class="stat-label">剩余课时</div>
        </div>
      </div>

      <!-- Records Section -->
      <section class="records-section">
        <h2 class="section-title">消课记录</h2>
        <div class="timeline" id="recordsContainer">
          <!-- Records will be rendered here -->
        </div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-brand">Emily's English Studio</div>
        <div class="footer-tagline">绍兴城南 · RAZ & Power Up</div>
      </footer>
    </div>
  </div>

  <script>
    // Global variable to store student data
    let studentData = null;
    let studentsList = [];

    // LocalStorage key
    const STORAGE_KEY = 'lesson_tracker_student_id';

    // Get stored student ID
    function getStoredStudentId() {
      return localStorage.getItem(STORAGE_KEY);
    }

    // Save student ID to localStorage
    function saveStudentId(studentId) {
      localStorage.setItem(STORAGE_KEY, studentId);
    }

    // Clear stored student ID
    function clearStoredStudentId() {
      localStorage.removeItem(STORAGE_KEY);
    }

    // Show login page
    function showLoginPage() {
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('detailPage').classList.remove('active');
      document.getElementById('nameInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    // Get avatar emoji based on name
    function getAvatarEmoji(name) {
      const emojiMap = {
        '兜兜': '🎒',
        'doudou': '🎒',
        'Mark': '📚',
        'mark': '📚',
        '小明': '🎓',
        '小华': '🌟'
      };
      return emojiMap[name] || '👤';
    }

    // Render detail page (student records)
    function renderDetailPage() {
      if (!studentData) return;
      
      // Update student name
      document.getElementById('studentName').textContent = studentData.name;
      
      // Calculate used hours from records
      const actualUsedHours = studentData.records.length;
      studentData.usedHours = actualUsedHours;
      
      // Calculate remaining hours
      const remaining = studentData.totalHours - studentData.usedHours;
      
      // Update stats
      document.getElementById('totalHours').textContent = studentData.totalHours;
      document.getElementById('usedHours').textContent = studentData.usedHours;
      document.getElementById('remainHours').textContent = Math.max(0, remaining);
      document.getElementById('remainingHours').textContent = Math.max(0, remaining);
      
      // Update last updated time
      const updateDate = new Date().toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      document.getElementById('lastUpdated').textContent = `更新时间：${updateDate}`;
      
      // Animate progress ring
      setTimeout(() => {
        const progress = remaining / studentData.totalHours;
        const circumference = 2 * Math.PI * 32;
        const offset = circumference * (1 - progress);
        document.getElementById('progressRing').style.strokeDashoffset = offset;
      }, 300);
      
      // Render records
      renderRecords();
      
      // Show detail page, hide loading and login
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('detailPage').classList.add('active');
    }

    function renderRecords() {
      const container = document.getElementById('recordsContainer');
      
      if (studentData.records.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📚</div>
            <p>暂无消课记录</p>
          </div>
        `;
        return;
      }
      
      const recordsHTML = studentData.records.map((record, index) => {
        const lessonNumber = index + 1;
        const isLatest = index === 0;
        
        return `
          <div class="record-card" data-index="${index}">
            <div class="timeline-dot"></div>
            <div class="record-header" onclick="toggleRecord(${index})">
              <div class="record-date">
                <span class="date">${formatDate(record.date)}</span>
                <span class="time">${record.time}</span>
              </div>
              <span class="lesson-badge">第${lessonNumber}次课</span>
            </div>
            <div class="record-content ${isLatest ? '' : 'collapsed'}" id="content-${index}">
              <div class="course-info">
                <div class="course-name">${record.courseName}</div>
                <div class="lesson-title">${record.lessonTitle}</div>
              </div>
              
              <div class="knowledge-section">
                <div class="section-header">
                  <span class="icon">📚</span>
                  <span>重点知识</span>
                </div>
                <ul class="knowledge-list">
                  ${record.keyKnowledge.map(k => `<li>${k}</li>`).join('')}
                </ul>
              </div>
              
              <div class="homework-section">
                <div class="section-header">
                  <span class="icon">📝</span>
                  <span>课后练习</span>
                </div>
                <ul class="homework-list">
                  ${record.homework.map(h => `<li>${h}</li>`).join('')}
                </ul>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      // Add expand/collapse all control if there are multiple records
      const expandControl = studentData.records.length > 1 ? `
        <div class="expand-indicator expanded" id="expandControl" onclick="toggleAll()">
          <span>收起历史记录</span>
          <span class="arrow">▼</span>
        </div>
      ` : '';
      
      container.innerHTML = recordsHTML + expandControl;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const weekDay = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
      return `${month}月${day}日 ${weekDay}`;
    }

    function toggleRecord(index) {
      const content = document.getElementById(`content-${index}`);
      if (content) {
        content.classList.toggle('collapsed');
      }
    }

    function toggleAll() {
      const control = document.getElementById('expandControl');
      const isExpanded = control.classList.contains('expanded');
      const contents = document.querySelectorAll('.record-content');
      
      contents.forEach((content, index) => {
        // Keep the first one (latest) always visible, collapse others
        if (isExpanded) {
          if (index > 0) content.classList.add('collapsed');
        } else {
          content.classList.remove('collapsed');
        }
      });
      
      control.classList.toggle('expanded');
      control.querySelector('span').textContent = isExpanded ? '展开历史记录' : '收起历史记录';
    }

    // Login handler
    async function handleLogin(nameInput) {
      const inputName = nameInput.trim().toLowerCase();
      const errorEl = document.getElementById('loginError');
      
      if (!inputName) {
        errorEl.innerHTML = '❗ 请输入学员姓名';
        return;
      }
      
      try {
        // Load students list
        const studentsResponse = await fetch('./students.json');
        if (!studentsResponse.ok) {
          throw new Error('无法加载学员列表');
        }
        studentsList = await studentsResponse.json();
        
        // Match student by name or id (case-insensitive, trim whitespace)
        const matchedStudent = studentsList.find(student => {
          const studentName = student.name.trim().toLowerCase();
          const studentId = student.id.trim().toLowerCase();
          return studentName === inputName || studentId === inputName;
        });
        
        if (!matchedStudent) {
          errorEl.innerHTML = '❗ 未找到该学员，请确认姓名';
          return;
        }
        
        // Save to localStorage
        saveStudentId(matchedStudent.id);
        
        // Load student data
        const response = await fetch(`./${matchedStudent.id}.json`);
        if (!response.ok) {
          throw new Error('无法加载学员数据');
        }
        studentData = await response.json();
        
        // Render detail page
        renderDetailPage();
        
      } catch (error) {
        console.error('Login error:', error);
        errorEl.innerHTML = '❗ 加载失败，请重试';
      }
    }

    // Load student data by ID
    async function loadStudentData(studentId) {
      try {
        const response = await fetch(`./${studentId}.json`);
        if (!response.ok) {
          throw new Error('Failed to load student data');
        }
        studentData = await response.json();
        renderDetailPage();
      } catch (error) {
        console.error('Error loading student data:', error);
        // If loading fails, show login page
        showLoginPage();
      }
    }

    // Logout handler
    function handleLogout() {
      clearStoredStudentId();
      studentData = null;
      showLoginPage();
    }

    // Main initialization
    document.addEventListener('DOMContentLoaded', async function() {
      // Check if there's a stored student ID
      const storedStudentId = getStoredStudentId();
      
      if (storedStudentId) {
        // Auto login with stored student ID
        await loadStudentData(storedStudentId);
      } else {
        // Show login page
        showLoginPage();
      }
      
      // Setup login form
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const nameInput = document.getElementById('nameInput').value;
        handleLogin(nameInput);
      });
      
      // Setup logout button
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    });
  </script>
</body>
</html>
